<!DOCTYPE html>
<html>
<head>
    <title>Profile</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="d-flex">

    <!-- SIDEBAR -->
    <div class="sidebar p-3">

        <div class="text-center mb-4">
            <img src="https://ui-avatars.com/api/?name=User&background=0D8ABC&color=fff"
                 class="avatar mb-2">
            <h6>{{ session['username'] }}</h6>
        </div>

        <hr>

        <ul class="nav flex-column">
            <li class="nav-item mb-2">
                <a href="/" class="nav-link">🏠 Dashboard</a>
            </li>

            <li class="nav-item mt-4">
                <a href="/logout" class="btn btn-outline-light btn-sm w-100">Logout</a>
            </li>
        </ul>

    </div>

    <!-- MAIN -->
    <div class="main-content p-4 w-100">

        <h3 class="mb-4">👤 Profile</h3>

        <div class="card shadow p-4">

            <h5>Username</h5>
            <p class="text-muted">{{ session['username'] }}</p>

            <hr>

            <h5>Account Info</h5>
            <p class="text-muted">Basic account details</p>

        </div>

    </div>

</div>

</body>
</html>
