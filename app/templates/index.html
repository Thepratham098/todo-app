<!DOCTYPE html>
<html>
<head>
    <title>Todo Workspace</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="d-flex">

    <!-- SIDEBAR -->
    <div class="sidebar p-3">

        <!-- USER PROFILE -->
        <div class="text-center mb-4">
            <img src="https://ui-avatars.com/api/?name=User&background=0D8ABC&color=fff"
                 class="avatar mb-2">
            <h6>{{ session['username'] if session['username'] else "User" }}</h6>
        </div>

        <hr>

        <!-- MENU -->
        <ul class="nav flex-column">
            <li class="nav-item mb-2">
                <a href="/" class="nav-link active">🏠 Dashboard</a>
            </li>

            <li class="nav-item mb-2">
                <a href="/profile" class="nav-link">📊 Weekly Stats</a>
            </li>

            <li class="nav-item mt-4">
                <a href="/logout" class="btn btn-outline-light btn-sm w-100">Logout</a>
            </li>
        </ul>

    </div>

    <!-- MAIN CONTENT -->
    <div class="main-content p-4 w-100">

        <h3 class="mb-4">Your Tasks</h3>

        <!-- SEARCH -->
        <input id="searchInput" class="form-control mb-3" placeholder="🔍 Search tasks..." onkeyup="searchTasks()">

        <!-- STATS -->
        <div class="mb-3 text-muted">
            <span id="taskCount"></span>
        </div>

        <!-- ADD TASK -->
        <div class="input-group mb-4">
            <input id="taskInput" class="form-control" placeholder="Add a new task...">
            <button onclick="addTask()" class="btn btn-dark">Add</button>
        </div>

        <!-- TASK LIST -->
        <div id="taskList" class="row"></div>

    </div>

</div>

<script>
let allTasks = [];

async function loadTasks() {
    const res = await fetch('/tasks');
    const tasks = await res.json();
    allTasks = tasks;

    renderTasks(tasks);
}

function renderTasks(tasks) {
    let html = '';

    document.getElementById('taskCount').innerText =
        `${tasks.length} tasks`;

    if (tasks.length === 0) {
        html = `<div class="text-center text-muted mt-5">
                    <h5>No tasks yet 😴</h5>
                    <p>Add something and get productive!</p>
                </div>`;
    }

    tasks.forEach(t => {
        html += `
        <div class="col-md-4">
            <div class="card task-card mb-3 ${t.completed ? 'completed' : ''}">
                <div class="card-body">

                    <h5>${t.title}</h5>
                    <small>${t.created_at || ''}</small>

                    <div class="d-flex justify-content-between mt-3">

                        <button onclick="toggle(${t.id})" class="btn btn-sm btn-success">
                            ✔
                        </button>

                        <button onclick="del(${t.id})" class="btn btn-sm btn-danger">
                            ✖
                        </button>

                    </div>
                </div>
            </div>
        </div>`;
    });

    document.getElementById('taskList').innerHTML = html;
}

function searchTasks() {
    const keyword = document.getElementById('searchInput').value.toLowerCase();

    const filtered = allTasks.filter(t =>
        t.title.toLowerCase().includes(keyword)
    );

    renderTasks(filtered);
}

async function addTask() {
    const title = document.getElementById('taskInput').value;

    if (!title.trim()) return alert("Empty task");

    await fetch('/add', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({title})
    });

    document.getElementById('taskInput').value = '';
    loadTasks();
}

async function del(id) {
    await fetch(`/delete/${id}`, {method: 'DELETE'});
    loadTasks();
}

async function toggle(id) {
    await fetch(`/complete/${id}`, {method: 'PUT'});
    loadTasks();
}

loadTasks();
</script>

</body>
</html>
